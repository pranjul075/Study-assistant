    <style>
        body {
            background-color: #050505;
            color: #e5e2e1;
            overflow-x: hidden;
            font-family: 'Geist', sans-serif;
        }

        .glass-base {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .glass-nested {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-studio {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .nebula-blob {
            position: fixed;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.2); }
        }

        .text-gradient {
            background: linear-gradient(135deg, #cebdff, #a4c9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .primary-btn {
            background: linear-gradient(135deg, #cebdff, #a78bfa);
            color: #21005e;
            box-shadow: 0 4px 20px rgba(206, 189, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .primary-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .progress-glow {
            filter: drop-shadow(0 0 8px #cebdff);
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

  <body class="font-body-md text-body-md antialiased min-h-screen">
