                      "surface-dim": "#0c1324",

                      "on-surface-variant": "#94a3b8",
                      "tertiary": "#ffffff",

                      "surface-container-lowest": "#070d1f",

                      "surface": "#0f172a",

                      "on-primary-container": "#386f50",
                      "error": "#ffb4ab",
                      "error-container": "#93000a",

                      "glass-stroke": "rgba(255, 255, 255, 0.1)",
                      "secondary": "#a1cde3",

                      "tertiary-container": "#eddcff",
                      "on-error": "#690005",

                      "primary-container": "#b4f0c9",
                      "surface-container-low": "#151b2d",

                      "on-secondary-fixed": "#001f2a",
                      "on-secondary": "#003546",

    <style>
        body {
            background-color: #0c1324;
            color: #dce1fb;
            overflow-x: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        .glass-base {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .glass-nested {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-studio {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.15;
            animation: float 25s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(100px, 50px) rotate(15deg); }
        }

        .text-gradient {
            background: linear-gradient(135deg, #ffffff, #a1cde3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .primary-btn {
            background: linear-gradient(135deg, #ffffff, #a1cde3);
            color: #001f2a;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .primary-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .glowing-edge {
            position: relative;
        }
        
        .glowing-edge::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            -webkit-mask-composite: exclude;
            mask-composite: exclude;
            pointer-events: none;
        }

        .progress-glow {
            filter: drop-shadow(0 0 8px #ffffff);
        }
    </style>
  </head>
  <body class="font-body-md text-body-md antialiased min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
