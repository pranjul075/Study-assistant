    <style>
      body {
        background-color: #131314;
        color: #e5e2e3;
        overflow-x: hidden;
        font-family: 'Geist', sans-serif;
      }

      /* Background Architectural Beams */
      .linear-beam {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 1px;
        background: linear-gradient(180deg, transparent, rgba(0, 219, 233, 0.08) 30%, rgba(0, 219, 233, 0.04) 70%, transparent);
        z-index: 0;
        pointer-events: none;
      }

      /* Glass Card Base */
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-nested {
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* Prism Border Glow */
      .prism-border {
        position: relative;
      }
      .prism-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), transparent 40%, rgba(255, 172, 232, 0.15) 80%, transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* Prism Refraction Corner Effects */
      .prism-refraction {
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
        transition: transform 0.3s ease-out;
      }
      .refraction-tl {
        top: -60px;
        left: -60px;
        background: rgba(0, 240, 255, 0.12);
      }
      .refraction-br {
        bottom: -60px;
        right: -60px;
        background: rgba(255, 172, 232, 0.08);
      }

      /* Gradient Button Glow */
      .gradient-button-glow {
        box-shadow: 0 4px 30px rgba(0, 240, 255, 0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gradient-button-glow:hover {
        box-shadow: 0 4px 40px rgba(0, 240, 255, 0.4);
      }

      .progress-glow {
        filter: drop-shadow(0 0 6px #00dbe9);
      }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.4s ease-out;
      }
    </style>
  </head>
  <body class="font-body-md text-body-md antialiased min-h-screen">
    <!-- Background Architectural Beams -->
    <div class="linear-beam" style="left: 10%;"></div>
    <div class="linear-beam" style="left: 35%; opacity: 0.4;"></div>
    <div class="linear-beam" style="left: 65%; opacity: 0.6;"></div>
    <div class="linear-beam" style="left: 90%;"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
