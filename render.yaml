services:
  # ── Single Web Service: Express serves built React frontend + API ──
  - type: web
    name: study-assistant
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run --prefix backend start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false          # Paste your Groq API key in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false          # Optional: paste your Gemini API key if using Gemini
