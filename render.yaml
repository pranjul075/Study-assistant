services:
  # ── Backend API (Node.js Web Service) ──────────────────────────
  - type: web
    name: aurastudy-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false          # You will paste this in the Render dashboard
      - key: FRONTEND_URL
        sync: false          # Paste your Render static site URL after it deploys

  # ── Frontend (Vite Static Site) ────────────────────────────────
  - type: web
    name: aurastudy
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Paste your aurastudy-api URL here
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
